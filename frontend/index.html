<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Platform - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="card auth-card">
            <h2 id="authTitle">Вхід у систему</h2>
            <p id="authSubtitle">Введіть свої дані для доступу до девайсів</p>
            
            <div id="alertBox" class="alert"></div>

            <form id="authForm">
                <div class="form-group">
                    <label for="username">Логін</label>
                    <input type="text" id="username" required autocomplete="username" placeholder="Введіть логін">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
                </div>

                <button type="submit" id="submitBtn">Увійти</button>
            </form>

            <div class="auth-toggle">
                <span id="toggleText">Немає акаунту? </span>
                <a id="toggleBtn">Зареєструватися</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
